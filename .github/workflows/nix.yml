name: Nix

on:
  push:
    branches: [main]
    paths:
      - 'pnpm-lock.yaml'
      - 'Cargo.lock'
      - 'flake.nix'
      - 'flake.lock'
  pull_request:
    paths:
      - 'pnpm-lock.yaml'
      - 'Cargo.lock'
      - 'flake.nix'
      - 'flake.lock'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  update-hashes:
    name: Update Nix hashes
    runs-on: ubuntu-latest
    # Only auto-commit on push to main, not on PRs
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check pnpmDeps hash
        id: check
        run: |
          set +e
          OUTPUT=$(nix build .#pnpmDeps --no-link 2>&1)
          EXIT=$?
          set -e

          if [ $EXIT -eq 0 ]; then
            echo "hash_ok=true" >> "$GITHUB_OUTPUT"
            echo "pnpmDeps hash is up to date"
          else
            NEW_HASH=$(echo "$OUTPUT" | grep 'got:' | awk '{print $2}')
            if [ -n "$NEW_HASH" ]; then
              echo "hash_ok=false" >> "$GITHUB_OUTPUT"
              echo "new_hash=$NEW_HASH" >> "$GITHUB_OUTPUT"
              echo "pnpmDeps hash outdated, new hash: $NEW_HASH"
            else
              echo "Build failed for unknown reason:"
              echo "$OUTPUT"
              exit 1
            fi
          fi

      - name: Update pnpmDeps hash in flake.nix
        if: steps.check.outputs.hash_ok == 'false'
        run: |
          NEW_HASH="${{ steps.check.outputs.new_hash }}"
          # Replace the hash line in the pnpmDeps block
          sed -i "s|hash = \"sha256-.*\";|hash = \"$NEW_HASH\";|" flake.nix
          echo "Updated hash to $NEW_HASH"

      - name: Commit updated hash
        if: steps.check.outputs.hash_ok == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git diff --staged --quiet || git commit -m "chore(nix): update pnpmDeps hash"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check:
    name: Verify Nix build
    runs-on: ubuntu-latest
    # On PRs, just check — don't auto-commit
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check pnpmDeps hash
        run: nix build .#pnpmDeps --no-link

      - name: Check flake evaluates
        run: nix flake check --no-build
